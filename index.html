<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단어 틴더 📚</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ──────────────────────────────────────
       화면 1: 세트 선택 화면
  ────────────────────────────────────── -->
  <div id="screen-home" class="screen active">

    <div class="home-header">
      <h1 class="logo">📚 WordSwipe</h1>
      <p class="logo-sub">수능 영단어 스와이프 학습</p>
    </div>

    <div class="set-list" id="set-list">
      <!-- JavaScript로 세트 카드들이 여기에 생성됨 -->
    </div>

  </div>

  <!-- ──────────────────────────────────────
       화면 2: 스와이프 학습 화면
  ────────────────────────────────────── -->
  <div id="screen-swipe" class="screen">

    <!-- 상단 헤더 -->
    <div class="swipe-header">
      <button class="btn-back" id="btn-back">←</button>
      <div class="swipe-title" id="swipe-title">초급 단어 1</div>
      <div class="swipe-progress" id="swipe-progress">1 / 20</div>
    </div>

    <!-- 진행 바 -->
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar-fill"></div>
    </div>

    <!-- 카드 스택 영역 -->
    <div class="card-stack" id="card-stack">
      <!-- JavaScript로 카드들이 여기에 생성됨 -->
    </div>

    <!-- 도장 오버레이 (드래그할 때 나타남) -->
    <div class="stamp stamp-know"  id="stamp-know">KNOW ✅</div>
    <div class="stamp stamp-again" id="stamp-again">AGAIN 🔄</div>
    <div class="stamp stamp-star"  id="stamp-star">STAR ⭐</div>

    <!-- 하단 버튼 3개 -->
    <div class="action-buttons">
      <button class="action-btn btn-again" id="btn-again" title="다시 볼게요">
        <span class="btn-icon">🔄</span>
        <span class="btn-label">Again</span>
      </button>
      <button class="action-btn btn-star" id="btn-star" title="즐겨찾기">
        <span class="btn-icon">⭐</span>
        <span class="btn-label">Star</span>
      </button>
      <button class="action-btn btn-know" id="btn-know" title="알았어요">
        <span class="btn-icon">✅</span>
        <span class="btn-label">Know</span>
      </button>
    </div>

  </div>

  <!-- ──────────────────────────────────────
       화면 3: 결과 화면
  ────────────────────────────────────── -->
  <div id="screen-result" class="screen">

    <div class="result-header">
      <div class="result-emoji">🎉</div>
      <h2 class="result-title">학습 완료!</h2>
      <p class="result-sub" id="result-set-name"></p>
    </div>

    <div class="result-stats">
      <div class="stat-card stat-know">
        <div class="stat-icon">✅</div>
        <div class="stat-num" id="stat-know">0</div>
        <div class="stat-label">알았어요</div>
      </div>
      <div class="stat-card stat-again">
        <div class="stat-icon">🔄</div>
        <div class="stat-num" id="stat-again">0</div>
        <div class="stat-label">다시 볼게요</div>
      </div>
      <div class="stat-card stat-star">
        <div class="stat-icon">⭐</div>
        <div class="stat-num" id="stat-star">0</div>
        <div class="stat-label">즐겨찾기</div>
      </div>
    </div>

    <div class="result-buttons">
      <button class="result-btn btn-retry" id="btn-retry">
        🔄 틀린 것만 다시
      </button>
      <button class="result-btn btn-home" id="btn-home">
        🏠 세트 선택으로
      </button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
